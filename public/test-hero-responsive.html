<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AeroMat — Hero Responsive (Knockout + Glitch)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --orange: #FE9100;
      --blue: #0af;
      --yellow: #ffe600;
      --w: #fff;
      --w70: rgba(255,255,255,0.7);
      --w50: rgba(255,255,255,0.5);
      --w30: rgba(255,255,255,0.3);
      --w15: rgba(255,255,255,0.15);
      --b: #000;
      --fa: 'Anton', sans-serif;
      --fi: 'Inter', sans-serif;
    }

    html, body { width: 100%; height: 100%; overflow: hidden; }
    body {
      font-family: var(--fi);
      background: #050505;
      color: var(--w);
      -webkit-font-smoothing: antialiased;
    }

    /* ========== DEBUG BAR ========== */
    .debug-bar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 9999;
      background: rgba(0,0,0,0.92); backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display: flex; align-items: center; height: 36px;
      padding: 0 1rem; gap: 1rem; font-size: 0.7rem;
    }
    .debug-bar .label {
      color: var(--orange); font-family: var(--fa);
      font-size: 0.75rem; letter-spacing: 0.06em;
      padding-right: 0.8rem; border-right: 1px solid rgba(255,255,255,0.08);
      white-space: nowrap;
    }
    .debug-bar .info { color: var(--w30); white-space: nowrap; }
    .debug-bar .info b { color: var(--w50); font-weight: 600; }

    /* ========== HERO ========== */
    .hero {
      position: relative; width: 100vw; height: 100vh;
      overflow: hidden; isolation: isolate;
    }

    .hero video {
      position: absolute; inset: 0;
      width: 100%; height: 100%; object-fit: cover; z-index: 0;
    }

    /* ========== KNOCKOUT OVERLAY ========== */
    .ko {
      position: absolute; top: 0; left: 0; bottom: 0;
      z-index: 2;
      background: rgba(5,5,5,0.72);
      mix-blend-mode: multiply;
    }

    /* Desktop: left 55% with soft fade */
    @media (min-width: 1025px) {
      .ko {
        width: 55%;
        -webkit-mask-image: linear-gradient(to right, black 75%, transparent 100%);
        mask-image: linear-gradient(to right, black 75%, transparent 100%);
      }
    }

    /* Tablet: left 50% with soft fade */
    @media (max-width: 1024px) and (min-width: 769px) {
      .ko {
        width: 50%;
        top: 0;
        -webkit-mask-image: linear-gradient(to right, black 70%, transparent 100%);
        mask-image: linear-gradient(to right, black 70%, transparent 100%);
      }
    }

    /* Mobile + small: bottom half with soft fade on top edge */
    @media (max-width: 768px) {
      .ko {
        width: 100%;
        top: auto;
        bottom: 0;
        height: 55%;
        -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 20%);
        mask-image: linear-gradient(to bottom, transparent 0%, black 20%);
      }
    }

    /* Light gradient on exposed video area */
    .video-grad {
      position: absolute; inset: 0; z-index: 1; pointer-events: none;
      background: linear-gradient(to bottom, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.03) 50%, rgba(0,0,0,0.5) 100%);
    }
    @media (max-width: 768px) {
      .video-grad {
        background: linear-gradient(to bottom, rgba(0,0,0,0.05) 0%, rgba(0,0,0,0.02) 40%, rgba(0,0,0,0.3) 100%);
      }
    }

    /* ========== LEFT VERTICAL COLUMN ========== */
    .v-col {
      position: absolute; top: 0; left: 0; bottom: 0;
      display: flex; flex-direction: row; align-items: stretch; gap: 0; z-index: 3;
    }

    .v-word {
      flex: 0 0 auto;
      width: 60px; /* fallback — JS overrides */
      height: 100%; display: flex; align-items: flex-end; justify-content: center;
      writing-mode: vertical-lr; transform: rotate(180deg);
      overflow: hidden; opacity: 0; transition: opacity 0.3s ease;
      will-change: opacity, filter; position: relative;
    }
    .v-word.visible { opacity: 1; }

    .v-word .clip { display: inline-block; overflow: hidden; line-height: 0.82; }
    .v-word .clip .char {
      display: inline-block; font-family: var(--fa); text-transform: uppercase;
      color: var(--w); line-height: 0.82; letter-spacing: -0.02em;
      transform: translateY(110%); will-change: transform;
    }
    .v-word .clip .char.lowercase { text-transform: none; }
    .v-word .clip .char.revealed {
      transform: translateY(0);
      transition: transform 0.45s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* Mobile/small: words start at bottom edge of ko container */
    @media (max-width: 768px) {
      .v-col {
        top: auto;
        bottom: 0;
        height: auto;
      }
      .v-word {
        height: auto;
        align-items: flex-start;
        justify-content: flex-start;
      }
    }

    /* ========== RIGHT AKCJA COLUMN ========== */
    .h-col {
      position: absolute; top: auto; bottom: 0; right: 0;
      display: flex; flex-direction: column; justify-content: flex-end; gap: 0;
      margin: 0; padding: 0;
      opacity: 0; transition: opacity 0.5s ease;
      z-index: 3;
    }
    .h-col.active { opacity: 1; }

    /* On very small screens, AKCJA fills entire width */
    @media (max-width: 479px) {
      .h-col { left: 0 !important; }
    }

    .akcja-row {
      display: flex; justify-content: center; align-items: center;
      overflow: hidden; white-space: nowrap; margin: 0; padding: 0;
      will-change: filter; position: relative;
    }
    .akcja-row .clip { display: inline-block; overflow: hidden; line-height: 0.82; vertical-align: top; }
    .akcja-row .clip .char {
      display: inline-block; font-family: var(--fa); text-transform: uppercase;
      color: var(--w); line-height: 0.82; letter-spacing: -0.04em;
      transform: translateY(120%); will-change: transform;
    }
    .akcja-row .clip .char.revealed {
      transform: translateY(0);
      transition: transform 0.45s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* ========== GLITCH EFFECT ========== */
    .wave-el { position: relative; }
    .wave-el::before, .wave-el::after {
      content: attr(data-glitch);
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--fa); text-transform: uppercase;
      line-height: 0.82; pointer-events: none;
      color: transparent; -webkit-text-fill-color: transparent;
      opacity: 0; will-change: transform, opacity;
    }

    /* Blue ghost */
    .wave-el::before {
      -webkit-text-stroke: 4px var(--blue);
      filter: drop-shadow(0 0 15px var(--blue)) drop-shadow(0 0 40px rgba(0,170,255,0.8));
    }

    /* Yellow ghost */
    .wave-el::after {
      -webkit-text-stroke: 4px var(--yellow);
      filter: drop-shadow(0 0 15px var(--yellow)) drop-shadow(0 0 40px rgba(255,230,0,0.8))
             drop-shadow(0 0 60px rgba(0,170,255,0.35));
    }

    /* Active glitch state */
    .wave-el.glitch-now {
      filter: brightness(1.4);
      text-shadow:
        6px 0 3px var(--blue),
        -6px 0 3px var(--yellow),
        0 0 25px rgba(0,170,255,0.9),
        0 0 25px rgba(255,230,0,0.9),
        0 0 60px rgba(0,170,255,0.5),
        0 0 60px rgba(255,230,0,0.5);
      animation: glitchEdge 3s linear infinite;
    }
    .wave-el.glitch-now::before {
      opacity: 1;
      animation: ghostBlue 2s infinite linear alternate-reverse;
    }
    .wave-el.glitch-now::after {
      opacity: 1;
      animation: ghostYellow 2.7s infinite linear alternate-reverse;
    }

    @keyframes glitchEdge {
      0%,100% { text-shadow: 6px 0 3px var(--blue), -6px 0 3px var(--yellow), 0 0 25px rgba(0,170,255,.9), 0 0 25px rgba(255,230,0,.9), 0 0 60px rgba(0,170,255,.5), 0 0 60px rgba(255,230,0,.5); }
      8%  { text-shadow: 10px 0 5px var(--blue), -10px 0 5px var(--yellow), 0 0 40px rgba(0,170,255,1), 0 0 40px rgba(255,230,0,1), 0 0 90px rgba(0,170,255,.7), 0 0 90px rgba(255,230,0,.7); }
      10% { text-shadow: 4px 0 2px var(--blue), -4px 0 2px var(--yellow), 0 0 18px rgba(0,170,255,.7), 0 0 18px rgba(255,230,0,.7); }
      30% { text-shadow: 6px 0 3px var(--blue), -6px 0 3px var(--yellow), 0 0 25px rgba(0,170,255,.9), 0 0 25px rgba(255,230,0,.9); }
      33% { text-shadow: 14px 0 6px var(--blue), -14px 0 6px var(--yellow), 0 0 50px rgba(0,170,255,1), 0 0 50px rgba(255,230,0,1), 0 0 100px rgba(0,170,255,.8), 0 0 100px rgba(255,230,0,.8), 0 0 120px rgba(0,140,255,.4); }
      36% { text-shadow: 6px 0 3px var(--blue), -6px 0 3px var(--yellow), 0 0 25px rgba(0,170,255,.9), 0 0 25px rgba(255,230,0,.9); }
      65% { text-shadow: 6px 0 3px var(--blue), -6px 0 3px var(--yellow), 0 0 25px rgba(0,170,255,.9), 0 0 25px rgba(255,230,0,.9); }
      68% { text-shadow: 12px 0 5px var(--blue), -12px 0 5px var(--yellow), 0 0 45px rgba(0,170,255,1), 0 0 45px rgba(255,230,0,1), 0 0 90px rgba(0,170,255,.7), 0 0 90px rgba(255,230,0,.7), 0 0 110px rgba(0,140,255,.35); }
      71% { text-shadow: 3px 0 2px var(--blue), -3px 0 2px var(--yellow), 0 0 12px rgba(0,170,255,.6), 0 0 12px rgba(255,230,0,.6); }
      75% { text-shadow: 6px 0 3px var(--blue), -6px 0 3px var(--yellow), 0 0 25px rgba(0,170,255,.9), 0 0 25px rgba(255,230,0,.9); }
    }

    @keyframes ghostBlue {
      0%   { transform: translate(-5px, 0);    opacity: .7; }
      10%  { transform: translate(-8px, 1px);   opacity: .9; }
      20%  { transform: translate(-3px, -1px);  opacity: .5; }
      30%  { transform: translate(-10px, 0);    opacity: .8; }
      40%  { transform: translate(-4px, 2px);   opacity: .6; }
      50%  { transform: translate(-7px, -1px);  opacity: .9; }
      60%  { transform: translate(-2px, 0);     opacity: .4; }
      70%  { transform: translate(-9px, 1px);   opacity: .8; }
      80%  { transform: translate(-5px, -2px);  opacity: .7; }
      90%  { transform: translate(-8px, 0);     opacity: .9; }
      100% { transform: translate(-4px, 1px);   opacity: .6; }
    }

    @keyframes ghostYellow {
      0%   { transform: translate(5px, 0);     opacity: .7; }
      10%  { transform: translate(9px, -1px);   opacity: .8; }
      20%  { transform: translate(3px, 2px);    opacity: .5; }
      30%  { transform: translate(8px, 0);      opacity: .9; }
      40%  { transform: translate(4px, -2px);   opacity: .6; }
      50%  { transform: translate(10px, 1px);   opacity: .8; }
      60%  { transform: translate(2px, 0);      opacity: .4; }
      70%  { transform: translate(7px, -1px);   opacity: .9; }
      80%  { transform: translate(5px, 2px);    opacity: .7; }
      90%  { transform: translate(9px, 0);      opacity: .8; }
      100% { transform: translate(3px, -1px);   opacity: .6; }
    }

    /* ========== CTA BOTTOM ========== */
    .bot {
      position: absolute; bottom: 0; right: 0; z-index: 20;
      padding: clamp(1rem, 2.5vw, 2rem) clamp(1rem, 3vw, 3rem);
      background: none;
      opacity: 0; transform: translateY(12px);
      will-change: opacity, transform;
      max-width: 480px;
    }
    .bot.show { animation: fadeUp 0.8s ease forwards; }
    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

    .bot .copy {
      color: var(--w50); font-size: clamp(0.72rem, 0.9vw, 0.88rem);
      max-width: 420px; line-height: 1.6;
    }
    .bot .copy strong { color: var(--w); font-weight: 600; }

    .bot .row {
      display: flex; align-items: center; gap: 1.2rem;
      margin-top: 0.7rem; flex-wrap: wrap;
    }

    .btn {
      display: inline-flex; align-items: center; gap: 0.4rem;
      font-family: var(--fi); font-weight: 600;
      font-size: 0.85rem; padding: 0.75rem 1.6rem;
      border-radius: 5px; cursor: pointer;
      transition: all 0.2s; text-decoration: none; border: none;
    }
    .btn-o { background: var(--orange); color: var(--b); }
    .btn-o:hover { background: #e87f00; }

    .micro {
      display: flex; gap: 1.5rem; font-size: 0.72rem;
      color: var(--w30); flex-wrap: wrap;
    }
    .micro span { display: flex; align-items: center; gap: 0.35rem; }
    .micro span::before {
      content: ''; width: 5px; height: 5px; border-radius: 50%;
      background: var(--orange); opacity: 0.5; flex-shrink: 0;
    }

    /* ---- Tablet CTA adjustments ---- */
    @media (max-width: 1024px) {
      .bot { max-width: 400px; }
      .bot .copy { font-size: 0.75rem; }
    }

    /* ---- Mobile CTA adjustments ---- */
    @media (max-width: 767px) {
      .bot {
        left: 0; right: 0; max-width: 100%;
        padding: 1rem 1.5rem;
      }
      .bot .row { flex-direction: column; align-items: flex-start; gap: 0.6rem; }
      .btn { font-size: 0.8rem; padding: 0.65rem 1.4rem; }
    }

    /* ---- Small mobile CTA ---- */
    @media (max-width: 479px) {
      .bot { padding: 0.8rem 1.5rem; }
      .bot .copy { font-size: 0.7rem; line-height: 1.5; }
      .btn { font-size: 0.75rem; padding: 0.6rem 1.2rem; }
      .micro { font-size: 0.65rem; gap: 1rem; }
    }
  </style>
</head>
<body>

<!-- Debug bar showing current viewport -->
<div class="debug-bar" id="debugBar">
  <span class="label">RESPONSIVE</span>
  <span class="info" id="debugInfo"></span>
</div>

<section class="hero" id="hero">
  <video autoplay muted loop playsinline>
    <source src="/movies/hero_compressed.mp4" type="video/mp4"/>
    <source src="/movies/hero_compressed.webm" type="video/webm"/>
  </video>

  <!-- Light gradient on exposed video (desktop only) -->
  <div class="video-grad"></div>

  <!-- Knockout overlay -->
  <div class="ko" id="ko">
    <!-- Left vertical: sCIANA + KAMERA -->
    <div class="v-col" id="vCol">
      <div class="v-word wave-el" id="wS" data-text="śCIANA" data-glitch=""></div>
      <div class="v-word wave-el" id="wK" data-text="KAMERA" data-glitch=""></div>
    </div>

    <!-- Right: AKCJA rows -->
    <div class="h-col" id="hCol"></div>
  </div>

  <!-- CTA -->
  <div class="bot" id="bot">
    <p class="copy">Dostajesz <strong>mural, kt&oacute;ry przyci&#261;ga wzrok</strong> &mdash; i <strong>profesjonalny film z uj&#281;ciami z drona</strong>, kt&oacute;ry przyci&#261;ga obserwuj&#261;cych.</p>
    <div class="row">
      <a href="/kontakt" class="btn btn-o">Bezp&#322;atna wycena &rarr;</a>
      <div class="micro">
        <span>25+ lat do&#347;wiadczenia</span>
        <span>Film z drona gratis</span>
      </div>
    </div>
  </div>
</section>

<script>
(function() {
  'use strict';

  // =============================================
  // CONFIG
  // =============================================
  var GLITCH_INTERVAL = 800;   // ms between glitch cycle steps
  var GLITCH_ACTIVE = 2;       // how many elements glow at once

  var $S  = document.getElementById('wS');
  var $K  = document.getElementById('wK');
  var $hCol = document.getElementById('hCol');
  var $vCol = document.getElementById('vCol');
  var $ko   = document.getElementById('ko');
  var $bot  = document.getElementById('bot');
  var $dbg  = document.getElementById('debugInfo');

  var rows = [];
  var allWave = [];
  var waveIdx = 0;
  var waveInterval = null;

  // =============================================
  // BREAKPOINT HELPERS
  // =============================================
  function getBreakpoint() {
    var w = window.innerWidth;
    if (w >= 1025) return 'desktop';
    if (w >= 768)  return 'tablet';
    if (w >= 480)  return 'mobile';
    return 'small';
  }

  function isVerticalHidden() {
    return false; // Always show vertical words on all breakpoints
  }

  // =============================================
  // MEASUREMENT UTILITIES
  // =============================================
  function createMeasurer(text, styles) {
    var m = document.createElement('span');
    m.style.cssText = 'font-family:"Anton",sans-serif;text-transform:uppercase;white-space:nowrap;' +
      'visibility:hidden;position:absolute;top:-9999px;left:-9999px;line-height:.82;' + (styles || '');
    m.textContent = text;
    document.body.appendChild(m);
    return m;
  }

  /**
   * Binary search to find the largest font-size where text fits
   * within maxW x maxH bounding box.
   */
  function fitFont(text, maxW, maxH, letterSpacing) {
    var ls = letterSpacing || '-0.02em';
    var m = createMeasurer(text, 'letter-spacing:' + ls + ';');
    var lo = 4, hi = 2000, best = 20;

    for (var i = 0; i < 30; i++) {
      var mid = (lo + hi) / 2;
      m.style.fontSize = mid + 'px';
      if (m.offsetWidth <= maxW && m.offsetHeight <= maxH) {
        best = mid;
        lo = mid;
      } else {
        hi = mid;
      }
    }
    document.body.removeChild(m);
    return Math.floor(best);
  }

  function measureHeight(text, fs, ls) {
    var m = createMeasurer(text, 'letter-spacing:' + (ls || '-0.02em') + ';font-size:' + fs + 'px;');
    var h = m.offsetHeight;
    document.body.removeChild(m);
    return h;
  }

  function measureWidth(text, fs, ls) {
    var m = createMeasurer(text, 'letter-spacing:' + (ls || '-0.02em') + ';font-size:' + fs + 'px;');
    var w = m.offsetWidth;
    document.body.removeChild(m);
    return w;
  }

  // =============================================
  // RESPONSIVE SIZE MULTIPLIERS
  // =============================================
  function getVerticalHeightMultiplier() {
    var bp = getBreakpoint();
    switch (bp) {
      case 'desktop': return 0.87;
      case 'tablet':  return 0.92;   // tablet — left half, tall
      case 'mobile':  return 0.90;   // mobile — big
      default:        return 0.80;   // small — big
    }
  }

  function getMaxVerticalWidth() {
    var bp = getBreakpoint();
    switch (bp) {
      case 'desktop': return 9999;
      case 'tablet':  return window.innerWidth * 0.22;
      case 'mobile':  return window.innerWidth * 0.20;
      default:        return window.innerWidth * 0.16;
    }
  }

  function getMaxAkcjaRowHeight() {
    var vh = window.innerHeight;
    var bp = getBreakpoint();
    switch (bp) {
      case 'desktop': return Math.floor((vh - 140) / 3);
      case 'tablet':  return Math.floor((vh - 140) / 3);
      case 'mobile':  return Math.floor((vh * 0.55 - 100) / 4);  // bottom 55%, 4 rows + CTA
      default:        return Math.floor((vh * 0.55 - 90) / 5);    // bottom 55%, 5 rows + CTA
    }
  }

  // =============================================
  // BUILD VERTICAL WORD (sCIANA or KAMERA)
  // =============================================
  function buildVerticalWord(el) {
    var text = el.dataset.text;
    el.innerHTML = '';

    var vh = window.innerHeight;
    var heightMult = getVerticalHeightMultiplier();
    var maxVW = getMaxVerticalWidth();

    // For vertical text: "width" when rendered = height of horizontal text
    // "height" when rendered = width of horizontal text
    // We want the word height (vertical extent) = vh * multiplier
    // The word height in vertical = horizontal width of the text
    // So: fitFont(text, vh * mult, maxVW)
    var targetHeight = vh * heightMult;

    var fs = fitFont(text, targetHeight, maxVW, '0em');
    el._fs = fs;

    // The physical width of the vertical column = height of horizontal text
    var colWidth = measureHeight(text, fs, '0em');
    el.style.width = colWidth + 'px';
    // Explicit height = parent ko height (fixes flex row + writing-mode issue)
    var koH = el.closest('.ko') ? el.closest('.ko').offsetHeight : window.innerHeight;
    el.style.height = koH + 'px';

    // Build character spans
    var chars = text.split('');
    for (var i = 0; i < chars.length; i++) {
      var c = chars[i];
      var clip = document.createElement('div');
      clip.className = 'clip';
      var span = document.createElement('span');
      span.className = 'char';
      span.textContent = c;
      span.style.fontSize = fs + 'px';
      // Preserve lowercase for the s in sCIANA
      if (c === c.toLowerCase() && c !== c.toUpperCase()) {
        span.classList.add('lowercase');
      }
      clip.appendChild(span);
      el.appendChild(clip);
    }
  }

  // =============================================
  // BUILD AKCJA ROW
  // =============================================
  function buildAkcjaRow(fs) {
    var el = document.createElement('div');
    el.className = 'akcja-row wave-el';
    el.setAttribute('data-text', 'AKCJA');
    el.setAttribute('data-glitch', 'AKCJA');
    el.style.fontSize = fs + 'px';

    var h = measureHeight('AKCJA', fs, '-0.04em');
    el.style.height = h + 'px';
    el.style.flexShrink = '0';

    var chars = 'AKCJA'.split('');
    for (var i = 0; i < chars.length; i++) {
      var clip = document.createElement('div');
      clip.className = 'clip';
      var span = document.createElement('span');
      span.className = 'char';
      span.textContent = chars[i];
      span.style.fontSize = fs + 'px';
      clip.appendChild(span);
      el.appendChild(clip);
    }
    return el;
  }

  // =============================================
  // CHARACTER REVEAL ANIMATION
  // =============================================
  function reveal(el, stagger) {
    return new Promise(function(res) {
      var chars = el.querySelectorAll('.char');
      if (!chars.length) { res(); return; }
      chars.forEach(function(ch, i) {
        setTimeout(function() {
          ch.style.transition = 'transform .45s cubic-bezier(.16,1,.3,1)';
          ch.style.transform = 'translateY(0)';
          ch.classList.add('revealed');
          if (i === chars.length - 1) setTimeout(res, 460);
        }, i * stagger);
      });
    });
  }

  // =============================================
  // GLITCH WAVE (2 active, sequential, 800ms)
  // =============================================
  function startGlitchWave() {
    if (waveInterval) clearInterval(waveInterval);
    allWave = [];

    // Collect wave elements: vertical words (if visible) + AKCJA rows
    if (!isVerticalHidden()) {
      allWave.push($S, $K);
    }
    allWave = allWave.concat(rows);

    if (allWave.length === 0) return;

    waveIdx = 0;

    function tick() {
      // Clear all
      allWave.forEach(function(el) { el.classList.remove('glitch-now'); });

      // Activate GLITCH_ACTIVE consecutive elements
      for (var i = 0; i < GLITCH_ACTIVE; i++) {
        var idx = (waveIdx + i) % allWave.length;
        allWave[idx].classList.add('glitch-now');
      }
      waveIdx = (waveIdx + 1) % allWave.length;
    }

    tick();
    waveInterval = setInterval(tick, GLITCH_INTERVAL);
    $bot.classList.add('show');
  }

  // =============================================
  // MAIN LAYOUT
  // =============================================
  function layout() {
    var vw = window.innerWidth;
    var vh = window.innerHeight;
    var bp = getBreakpoint();

    // Update debug bar
    $dbg.innerHTML = '<b>' + vw + '</b>x<b>' + vh + '</b> &mdash; ' + bp;

    // --- VERTICAL WORDS ---
    var vColWidth = 0;
    var vColLeft = 0;

    if (!isVerticalHidden()) {
      buildVerticalWord($S);
      buildVerticalWord($K);

      var sW = parseFloat($S.style.width);
      var kW = parseFloat($K.style.width);
      vColWidth = sW + kW;

      // flex: 0 0 auto + explicit width from buildVerticalWord handles all breakpoints
      vColLeft = parseFloat(getComputedStyle($vCol).left) || 0;
      $vCol.style.width = vColWidth + 'px';
      $vCol.style.display = '';
    } else {
      $vCol.style.display = 'none';
      vColWidth = 0;
      vColLeft = 0;
    }

    // --- AKCJA COLUMN POSITION ---
    $hCol.style.left = (vColWidth + vColLeft) + 'px';

    // Ko actual dimensions depend on breakpoint
    var koWidth = $ko.offsetWidth;
    var koHeight = $ko.offsetHeight;

    var availW = koWidth - vColWidth - vColLeft;

    // --- AKCJA ROW SIZING ---
    var maxRowH = getMaxAkcjaRowHeight();

    var akcjaFs = fitFont('AKCJA', availW * 0.98, maxRowH, '-0.04em');
    var oneRowH = measureHeight('AKCJA', akcjaFs, '-0.04em');

    // Fill ko height with AKCJA rows
    var ctaReserve = (bp === 'mobile' || bp === 'small') ? 90 : 130;
    var availH = koHeight - ctaReserve;
    var count = Math.max(3, Math.ceil(availH / oneRowH));
    // Mobile/small: 2 fewer AKCJA rows
    if (bp === 'mobile' || bp === 'small') {
      count = Math.max(2, count - 2);
    }

    // Build rows
    $hCol.innerHTML = '';
    rows = [];
    for (var i = 0; i < count; i++) {
      var row = buildAkcjaRow(akcjaFs);
      $hCol.appendChild(row);
      rows.push(row);
    }

    // Position CTA
    if (!isVerticalHidden()) {
      $bot.style.left = (vColWidth + vColLeft) + 'px';
    } else {
      $bot.style.left = '0';
    }

    // Update allWave
    allWave = [];
    if (!isVerticalHidden()) allWave.push($S, $K);
    allWave = allWave.concat(rows);
  }

  // =============================================
  // INIT + ENTRANCE ANIMATION
  // =============================================
  function init() {
    layout();

    if (!isVerticalHidden()) {
      // Reveal sCIANA
      setTimeout(function() {
        $S.classList.add('visible');
        reveal($S, 55);
      }, 300);

      // Reveal KAMERA
      setTimeout(function() {
        $K.classList.add('visible');
        reveal($K, 55);
      }, 1100);

      // Reveal AKCJA rows
      setTimeout(function() {
        $hCol.classList.add('active');
        rows.forEach(function(r, i) {
          setTimeout(function() { reveal(r, 40); }, i * 80);
        });
        setTimeout(startGlitchWave, 600 + rows.length * 80);
      }, 2100);

    } else {
      // Small screen: no vertical words, just AKCJA
      setTimeout(function() {
        $hCol.classList.add('active');
        rows.forEach(function(r, i) {
          setTimeout(function() { reveal(r, 40); }, i * 80);
        });
        setTimeout(startGlitchWave, 400 + rows.length * 80);
      }, 300);
    }
  }

  // =============================================
  // RESIZE HANDLER
  // =============================================
  var resizeTimer;
  window.addEventListener('resize', function() {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(function() {
      if (waveInterval) clearInterval(waveInterval);

      var wasActive = $hCol.classList.contains('active');
      var vertWasVisible = $S.classList.contains('visible');

      layout();

      // Re-reveal everything that was already visible
      if (!isVerticalHidden()) {
        [$S, $K].forEach(function(el) {
          if (vertWasVisible) {
            el.classList.add('visible');
            el.querySelectorAll('.char').forEach(function(c) {
              c.style.transition = 'none';
              c.style.transform = 'translateY(0)';
              c.classList.add('revealed');
            });
          }
        });
      }

      if (wasActive) {
        $hCol.classList.add('active');
        rows.forEach(function(r) {
          r.querySelectorAll('.char').forEach(function(c) {
            c.style.transition = 'none';
            c.style.transform = 'translateY(0)';
            c.classList.add('revealed');
          });
        });
        startGlitchWave();
      }
    }, 200);
  });

  // =============================================
  // BOOT
  // =============================================
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }

})();
</script>
</body>
</html>
