<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AeroMat — Knockout Flicker Fullscreen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{--orange:#FE9100;--w:#fff;--w50:rgba(255,255,255,.5);--w30:rgba(255,255,255,.3);--b:#000}
    body{font-family:'Inter',sans-serif;background:#050505;color:var(--w);-webkit-font-smoothing:antialiased;overflow-x:hidden}
    .btn{display:inline-flex;align-items:center;gap:.4rem;font-family:'Inter',sans-serif;font-weight:600;font-size:.85rem;padding:.75rem 1.6rem;border-radius:5px;cursor:pointer;transition:all .2s;text-decoration:none;border:none}
    .btn-o{background:var(--orange);color:var(--b)}.btn-o:hover{background:#e87f00}
    .btn-g{background:transparent;color:var(--w);border:1.5px solid rgba(255,255,255,.15)}.btn-g:hover{border-color:var(--w50)}
    .micro{display:flex;gap:1.5rem;font-size:.72rem;color:var(--w30);flex-wrap:wrap}
    .micro span{display:flex;align-items:center;gap:.35rem}
    .micro span::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--orange);opacity:.5}

    .hero{position:relative;width:100%;height:100vh;overflow:hidden;isolation:isolate}
    .hero video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0}

    /* Knockout — cały ekran */
    .ko{
      position:absolute;inset:0;z-index:2;
      background:rgba(5,5,5,.88);
      mix-blend-mode:multiply;
      display:grid;
      /* 3 rows: ŚCIANA top, KAMERA bottom, AKCJA left+right handled by grid columns */
      grid-template-columns:auto 1fr auto;
      grid-template-rows:1fr 1fr;
      gap:0;margin:0;padding:0;
      align-items:center;
    }

    /* Main horizontal words — span full middle column */
    .ko .h-line{
      grid-column:1/-1;
      display:flex;justify-content:center;align-items:center;
      overflow:hidden;white-space:nowrap;
      margin:0;padding:0;
    }

    /* Side vertical words — fill full grid height */
    .ko .v-line{
      grid-row:1/-1;
      display:flex;align-items:center;justify-content:center;
      writing-mode:vertical-lr;
      overflow:hidden;white-space:nowrap;
      margin:0;padding:0;
    }
    .ko .v-left{
      grid-column:1;
      transform:rotate(180deg);
    }
    .ko .v-right{
      grid-column:3;
    }

    /* All letters */
    .ko .ch{
      display:inline-block;
      font-family:'Anton',sans-serif;text-transform:uppercase;
      color:var(--w);
      line-height:.82;letter-spacing:-0.03em;
      margin:0;padding:0;
      /* Intro: slide up + blur */
      transform:translateY(115%);opacity:0;filter:blur(10px);
      animation:intro .6s cubic-bezier(.16,1,.3,1) forwards;
    }
    /* Vertical letters use translateX instead */
    .ko .v-line .ch{
      letter-spacing:0.05em;
      transform:translateX(110%);opacity:0;filter:blur(8px);
      animation:introX .5s cubic-bezier(.16,1,.3,1) forwards;
    }

    @keyframes intro{to{transform:translateY(0);opacity:1;filter:blur(0)}}
    @keyframes introX{to{transform:translateX(0);opacity:1;filter:blur(0)}}

    /* Continuous flicker */
    .ch.alive{
      animation:flicker var(--fd,3s) ease-in-out infinite;
      animation-delay:var(--fdd,0s);
    }
    @keyframes flicker{
      0%  {opacity:1;   filter:brightness(1)  hue-rotate(0deg)}
      3%  {opacity:.55; filter:brightness(1.4) hue-rotate(5deg)}
      5%  {opacity:1;   filter:brightness(1)   hue-rotate(0deg)}
      12% {opacity:.85; filter:brightness(1.2) hue-rotate(-3deg)}
      14% {opacity:1;   filter:brightness(1)   hue-rotate(0deg)}
      40% {opacity:1;   filter:brightness(1)   hue-rotate(0deg)}
      42% {opacity:.4;  filter:brightness(1.6) hue-rotate(8deg)}
      43% {opacity:.9;  filter:brightness(1.1) hue-rotate(2deg)}
      44% {opacity:.3;  filter:brightness(1.8) hue-rotate(-5deg)}
      46% {opacity:1;   filter:brightness(1)   hue-rotate(0deg)}
      70% {opacity:1;   filter:brightness(1)   hue-rotate(0deg)}
      72% {opacity:.65; filter:brightness(1.3) hue-rotate(4deg)}
      74% {opacity:1;   filter:brightness(1)   hue-rotate(0deg)}
      100%{opacity:1;   filter:brightness(1)   hue-rotate(0deg)}
    }

    /* CTA */
    .bot{
      position:absolute;bottom:0;left:0;right:0;z-index:20;
      padding:clamp(1rem,2.5vw,2rem) clamp(1.5rem,5vw,4rem);
      background:linear-gradient(to top,rgba(0,0,0,.98) 0%,rgba(0,0,0,.5) 55%,transparent 100%);
      opacity:0;transform:translateY(12px);
      animation:fadeUp .8s ease 1.6s forwards;
    }
    .bot .copy{color:var(--w50);font-size:clamp(.8rem,1vw,.9rem);max-width:500px;line-height:1.6}
    .bot .copy strong{color:var(--w);font-weight:600}
    .bot .row{display:flex;align-items:center;gap:1.5rem;margin-top:.7rem;flex-wrap:wrap}
    @keyframes fadeUp{to{opacity:1;transform:translateY(0)}}
    @media(max-width:768px){.bot .row{flex-direction:column;align-items:flex-start;gap:.8rem}}
  </style>
</head>
<body>

<section class="hero">
  <video autoplay muted loop playsinline>
    <source src="/movies/hero_compressed.mp4" type="video/mp4"/>
    <source src="/movies/hero_compressed.webm" type="video/webm"/>
  </video>

  <div class="ko">
    <div class="v-line v-left" data-text="AKCJA" data-mode="v" data-delay="1.0"></div>
    <div class="h-line" data-text="ŚCIANA" data-mode="h" data-delay="0.15"></div>
    <div class="v-line v-right" data-text="AKCJA" data-mode="v" data-delay="1.1"></div>
    <div class="h-line" data-text="KAMERA" data-mode="h" data-delay="0.5" style="grid-column:2;"></div>
  </div>

  <div class="bot">
    <p class="copy">Dostajesz <strong>mural, który przyciąga wzrok</strong> — i <strong>profesjonalny film z drona</strong>, który przyciąga obserwujących. Jedno zlecenie, podwójna korzyść.</p>
    <div class="row">
      <a href="#" class="btn btn-o">Bezpłatna wycena &rarr;</a>
      <div class="micro">
        <span>25+ lat doświadczenia</span>
        <span>Film z drona gratis</span>
        <span>Trwałość 10+ lat</span>
      </div>
    </div>
  </div>
</section>

<script>
function init(){
  document.querySelectorAll('[data-text]').forEach(el=>{
    const text=el.dataset.text;
    const mode=el.dataset.mode; // "h" or "v"
    const baseDelay=parseFloat(el.dataset.delay)||.2;
    el.innerHTML='';

    if(mode==='h'){
      // Horizontal: binary search font-size to fill width+height
      const m=document.createElement('span');
      m.style.cssText="font-family:'Anton',sans-serif;text-transform:uppercase;white-space:nowrap;visibility:hidden;position:absolute;line-height:.82;letter-spacing:-0.03em;";
      m.textContent=text;
      document.body.appendChild(m);

      const tw=el.offsetWidth*.99;
      const th=el.offsetHeight*.98;
      let lo=10,hi=1500,best=120;
      for(let i=0;i<30;i++){
        const mid=(lo+hi)/2;
        m.style.fontSize=mid+'px';
        if(m.offsetWidth<=tw&&m.offsetHeight<=th){best=mid;lo=mid}else hi=mid;
      }
      document.body.removeChild(m);

      [...text].forEach((c,i)=>{
        const s=document.createElement('span');
        s.className='ch';
        s.textContent=c===' '?'\u00A0':c;
        s.style.fontSize=best+'px';
        s.style.animationDelay=`${baseDelay+i*.035}s`;
        el.appendChild(s);
      });
    } else {
      // Vertical: binary search font-size to fill height of container
      const m=document.createElement('span');
      m.style.cssText="font-family:'Anton',sans-serif;text-transform:uppercase;white-space:nowrap;visibility:hidden;position:absolute;writing-mode:vertical-lr;line-height:.82;letter-spacing:0.05em;";
      m.textContent=text;
      document.body.appendChild(m);

      const tw=el.offsetWidth*.98;
      const th=el.offsetHeight*.96;
      let lo=10,hi=800,best=60;
      for(let i=0;i<30;i++){
        const mid=(lo+hi)/2;
        m.style.fontSize=mid+'px';
        if(m.offsetHeight<=th&&m.offsetWidth<=tw){best=mid;lo=mid}else hi=mid;
      }
      document.body.removeChild(m);

      [...text].forEach((c,i)=>{
        const s=document.createElement('span');
        s.className='ch';
        s.textContent=c;
        s.style.fontSize=best+'px';
        s.style.animationDelay=`${baseDelay+i*.08}s`;
        el.appendChild(s);
      });
    }
  });

  // After intro → continuous flicker
  const all=document.querySelectorAll('.ch');
  let maxEnd=0;
  all.forEach(c=>{maxEnd=Math.max(maxEnd,(parseFloat(c.style.animationDelay)||0)+.7)});

  setTimeout(()=>{
    all.forEach(c=>{
      c.style.animation='none';
      c.style.transform='none';
      c.style.opacity='1';
      c.style.filter='none';
      c.offsetHeight;
      c.style.setProperty('--fd',(2.5+Math.random()*3).toFixed(2)+'s');
      c.style.setProperty('--fdd',(Math.random()*2.5).toFixed(2)+'s');
      c.classList.add('alive');
    });
  },maxEnd*1000+50);
}

init();
let rt;
window.addEventListener('resize',()=>{clearTimeout(rt);rt=setTimeout(init,200)});
</script>
</body>
</html>
